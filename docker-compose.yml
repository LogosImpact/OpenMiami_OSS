# Local dev: Postgres 16 + PostGIS, auto-seeded from db/schema.sql + db/seed.sql.
# Bring it up with `npm run db:up` (or `docker compose up -d db`).
# Reset and re-seed with `npm run db:reset`.

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: openmiami_db
    environment:
      POSTGRES_USER: openmiami
      POSTGRES_PASSWORD: openmiami
      POSTGRES_DB: openmiami
    ports:
      - "5432:5432"
    volumes:
      - openmiami_pgdata:/var/lib/postgresql/data
      # Files in /docker-entrypoint-initdb.d run in lexical order on first boot
      # only (or after `docker compose down -v`). Numeric prefixes enforce order.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/20-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmiami -d openmiami"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openmiami_pgdata:
